# Experiment C: Full-supervision Focal Loss (all pixels) - Stage 2
# python train_stage2.py --config configs/stage2_focal_full.yaml

data_dir: "./data/data"
checkpoint_dir: "./checkpoints/expC_focal_full"
log_dir: "./logs/expC_focal_full/stage2"
stage1_ckpt: "./checkpoints/expC_focal_full/stage1_best.pth"

model_type: "ObPlaNet_resnet18_keypoint"
freeze_encoders: false

data_type: "gaussian"
image_size: 256
batch_size: 32
num_workers: 4

epochs: 30
optimizer: "adamw"
lr: 1.0e-5
weight_decay: 1.0e-4

loss: "focal"
focal_alpha: 2.0
focal_beta: 4.0
focal_pos_weight: 50.0
gaussian_sigma_factor: 8.0
focal_full_supervision: true

patience: 12
early_stop_metric: "val_loss"
early_stop_delta: 1.0e-4

print_freq: 100
tensorboard: true
