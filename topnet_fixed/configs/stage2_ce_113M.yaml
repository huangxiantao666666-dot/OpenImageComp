# Experiment A (113M): Sparse CrossEntropy - Stage 2
# python train_stage2.py --config configs/stage2_ce_113M.yaml

data_dir: "./data/data"
checkpoint_dir: "./checkpoints/expA_ce_113M"
log_dir: "./logs/expA_ce_113M/stage2"
stage1_ckpt: "./checkpoints/expA_ce_113M/stage1_best.pth"

model_type: "ObPlaNet_resnet18_113M"
freeze_encoders: false

data_type: "sparse"
image_size: 256
batch_size: 32
num_workers: 4

epochs: 30
optimizer: "adamw"
lr: 1.0e-5
weight_decay: 1.0e-4

loss: "cross_entropy"
loss_ignore_index: 255

patience: 12
early_stop_metric: "val_loss"
early_stop_delta: 1.0e-4

print_freq: 100
tensorboard: true
